# ============================================================
# Nginx — Reverse proxy para Lexiora n8n
# ============================================================
# Instalación en el VPS:
#   sudo cp lexiora.conf /etc/nginx/sites-available/lexiora
#   sudo ln -s /etc/nginx/sites-available/lexiora /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d n8n.tudominio.cl
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================

server {
    listen 80;
    server_name n8n.tudominio.cl;   # <-- reemplazar con el dominio real

    # Redirigir todo HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name n8n.tudominio.cl;   # <-- reemplazar con el dominio real

    # Certificados SSL (generados por Certbot)
    ssl_certificate     /etc/letsencrypt/live/n8n.tudominio.cl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n8n.tudominio.cl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Tamaño máximo de body (para webhooks con payloads grandes)
    client_max_body_size 16M;

    # Proxy hacia n8n (corre en localhost:5678)
    location / {
        proxy_pass         http://127.0.0.1:5678;
        proxy_http_version 1.1;

        # Headers requeridos por n8n
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket (necesario para la UI de n8n en tiempo real)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # Timeouts generosos para ejecuciones largas
        proxy_read_timeout    300s;
        proxy_connect_timeout 75s;
    }
}
