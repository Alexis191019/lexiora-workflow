services:
  n8n:
    image: n8nio/n8n:latest
    restart: always
    ports:
      - "127.0.0.1:5678:5678"   # solo accesible desde localhost; Nginx hace el proxy público
    environment:
      # ── Autenticación y seguridad n8n ──────────────────────────────────
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - GENERIC_TIMEZONE=America/Santiago
      - N8N_LOG_LEVEL=warn

      # ── Variables de negocio (accesibles como $env.XXX en los workflows) ──
      # OpenAI, Supabase y WhatsApp NO van aquí — se configuran en
      # n8n → Credentials → Add credential (quedan cifradas con N8N_ENCRYPTION_KEY)
      - FLOW_API_KEY=${FLOW_API_KEY}
      - FLOW_SECRET_KEY=${FLOW_SECRET_KEY}
      - FLOW_API_URL=${FLOW_API_URL}
      - PRECIO_CLP=${PRECIO_CLP}
    volumes:
      - n8n_data:/home/node/.n8n
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  n8n_data:
    driver: local
